<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name='robots' content='noindex,nofollow'>
        <title>Y.T photo studio</title>
        <meta name="description" content="フォトグラファー山田太郎のフォトスタジオ Y.T photo studioのオフィシャルサイトです。">
        
        <!-- favicon/webclipicon -->
        <link rel="shortcut icon" href="favicon.ico" />
        <link rel="apple-touch-icon" href="webclip.png" />

        <!-- ogp -->
        <meta property="og:site_name" content="Y.T photo studio" />
        <meta property="og:url" content="https://www.photog.ha-site877.com" />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Y.T photo studio" />
        <meta property="og:description" content="フォトグラファー山田太郎のフォトスタジオ Y.T photo studioのオフィシャルサイトです。" />
        <meta property="og:image" content="https://www.photog.ha-site877.com/asset/img/ogp.png" />
        <meta property="og:locale" content="ja_JP" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:description" content="フォトグラファー山田太郎のフォトスタジオ Y.T photo studioのオフィシャルサイトです。" />
        <meta name="twitter:image:src" content="https://www.photog.ha-site877.com/asset/img/ogp.png" />

        <!-- fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Noto+Serif+JP:wght@200..900&display=swap" rel="stylesheet">

        <!-- css -->
        <link rel="stylesheet" href="./asset/css/style.min.css" />
    </head>

    <body>
        <!-- header -->
        <header class="l-header">
            <div class="p-header__logo">
                <img src="./asset/img/logo.svg" alt="ロゴ">
            </div>
        </header>

        <!-- main -->
        <main class="l-main">
            <div class="p-key-visual">
                <div class="p-key-visual__image">
                    <picture>
                        <!-- PC WebP -->
                        <source
                            media="(min-width: 600px)"
                            srcset="./asset/img/bg-top-kv-pc.webp 1x, ./asset/img/bg-top-kv-pc@2x.webp 2x"
                            type="image/webp"
                        >
                        <!-- PC JPG -->
                        <source
                            media="(min-width: 600px)"
                            srcset="./asset/img/bg-top-kv-pc.jpg 1x, ./asset/img/bg-top-kv-pc@2x.jpg 2x"
                        >
                        <!-- SP WebP -->
                        <source
                            srcset="./asset/img/bg-top-kv-sp.webp 1x, ./asset/img/bg-top-kv-sp@2x.webp 2x"
                            type="image/webp"
                        > 
                        <!-- SP JPG fallback -->               
                        <img
                            src="./asset/img/bg-top-kv-sp.jpg"
                            srcset="./asset/img/bg-top-kv-sp.jpg 1x, ./asset/img/bg-top-kv-sp@2x.jpg 2x"
                            alt="キービジュアル"
                            width="400"
                            height="555"
                        >
                    </picture>
                </div>
                <div class="p-key-visual__inner">
                    <h1 class="p-key-visual__header">
                        <span class="p-key-visual__header--sub">photographer</span>
                        <span class="p-key-visual__header--main">YAMADA TARO</span>
                    </h1>
                    <p class="p-key-visual__text">photographer</p>
                </div>
            </div>

            <div class="p-sections__outer">
                <section class="c-section p-profile">
                    <h2 class="c-section__heading">
                        <span class="c-section__heading--main">Profile</span>
                        <span class="c-section__heading--sub">プロフィール</span>
                    </h2>
                    <div class="p-profile__inner">
                        <div class="p-profile__image">
                            <picture>
                                <!-- WebP -->
                                <source
                                    srcset="./asset/img/pic-top-profile.webp 1x, ./asset/img/pic-top-profile@2x.webp 2x"
                                    type="image/webp"
                                > 
                                <!-- JPG fallback -->               
                                <img
                                    src="./asset/img/pic-top-profile.jpg"
                                    srcset="./asset/img/pic-top-profile.jpg 1x, ./asset/img/pic-top-profile@2x.jpg 2x"
                                    alt="キービジュアル"
                                    width="540"
                                    height="355"
                                >
                            </picture>
                        </div>
                        <div class="p-profile__text-area">
                            <p class="p-profile__name">
                                <span class="p-profile__name--main">山田 太郎</span>
                                <span class="p-profile__name--sub">YAMADA TARO</span>
                            </p>
                            <p class="c-section__text">
                                親譲りの無鉄砲で小供の時から損ばかりしている。小学校に居る時分学校の二階から飛び降りて一週間ほど腰を抜かした事がある。なぜそんな無闇をしたと聞く人があるかも知れぬ。
                            </p>
                            <p class="c-section__text">
                                別段深い理由でもない。新築の二階から首を出していたら、同級生の一人が冗談に、いくら威張っても、そこから飛び降りる事は出来まい。弱虫やーい。
                            </p>
                        </div>
                    </div>
                </section>
            </div>

        </main>

        <footer class="l-footer">

        </footer>


    </body>


</html>
